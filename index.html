<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación de Círculos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <span class="navbar-brand">Simulación de Círculos</span>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container my-4">

    <!-- SLIDER -->
    <div class="card p-3 shadow glass">
        <h5 class="text-center">Cantidad de círculos</h5>
        <input type="range" min="2" max="30" value="10" id="slider" class="form-range">
        <p class="text-center">Cantidad: <span id="valor">10</span></p>
    </div>

    <!-- CANVAS -->
    <div class="row mt-4 g-4">

        <div class="col-md-4">
            <div class="card glass p-2 shadow">
                <h6 class="text-center">Movimiento</h6>
                <canvas id="canvas1"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass p-2 shadow">
                <h6 class="text-center">Colisión</h6>
                <canvas id="canvas2"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card glass p-2 shadow">
                <h6 class="text-center">Rebote</h6>
                <canvas id="canvas3"></canvas>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    Desarrollado por: Aylin Guadalupe Lucas Alvarado
</footer>

<!-- CONTROL GLOBAL -->
<script>
let NUM_CIRCLES = 10;

const slider = document.getElementById("slider");
const valor = document.getElementById("valor");

slider.addEventListener("input", () => {
    NUM_CIRCLES = parseInt(slider.value);
    valor.textContent = slider.value;

    if (window.iniciarMovimiento) iniciarMovimiento();
    if (window.iniciarColision) iniciarColision();
    if (window.iniciarRebote) iniciarRebote();
});
</script>

<!-- JS -->
<script src="assets/js/main.js"></script>
<script src="assets/js/main_colision.js"></script>
<script src="assets/js/main_rebote.js"></script>

</body>
</html>
